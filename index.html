<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Pantau Gempa AI</title>

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>

<body>

    <h1>Pantau Gempa AI</h1>
    <div class="filter-container">

        <label for="magnitudeFilter">

            Filter Magnitude

        </label>

        <select id="magnitudeFilter">

            <option value="0">All</option>

            <option value="3">Magnitude ≥ 3</option>

            <option value="5">Magnitude ≥ 5</option>

            <option value="7">Magnitude ≥ 7</option>

        </select>

    </div>
    <div id="dashboard-summary"></div>
    <div id="earthquake-container"></div>
    <h2>🌍 Live Earthquake Map</h2>

    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/map.js"></script>
    <script src="assets/js/dashboard.js"></script>
</body>

</html>
